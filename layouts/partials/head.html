<meta charset="UTF-8" />
<link rel="icon" type="image/x-icon" href="{{ "favicon.ico" | relURL }}" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}" />
<link rel="canonical" href="{{ .Permalink }}" />

<!-- Preconnect & DNS-Prefetch for Fast CDN Connections -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin />

{{ range .AlternativeOutputFormats -}}
<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Title | default site.Title }} ({{ .Name }})">
{{ end -}}

<meta http-equiv="Cache-Control" content="public, max-age=604800" />
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | Javad Rajabzadeh{{ end }}</title>

<!-- Open Graph Meta Tags -->
<meta property="og:locale" content="en_US" />
<meta property="og:site_name" content="Javad Rajabzadeh" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}" />
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}" />
<meta property="og:image" content="{{ site.Params.avatar | absURL }}" />

<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="{{ site.Params.twitterCreator }}" />
<meta name="twitter:creator" content="{{ site.Params.twitterCreator }}" />
<meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}" />
<meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}" />
<meta name="twitter:image" content="{{ site.Params.avatar | absURL }}" />

{{ $style := resources.Get "style.css" | resources.Minify | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}" />

<!-- Schema.org JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.Params.author }}",
  "url": "{{ site.BaseURL }}",
  "image": "{{ site.Params.avatar | absURL }}",
  "sameAs": [
    "https://github.com/ja7ad",
    "https://www.linkedin.com/in/ja7ad/",
    "https://twitter.com/Ja7adR",
    "https://scholar.google.com/citations?user=PXkS0K0AAAAJ"
  ],
  "jobTitle": "Senior Software Engineer",
  "description": "{{ site.Params.description }}"
}
</script>

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": "{{ .Title }}",
  "description": "{{ if .Description }}{{ .Description }}{{ else }}{{ .Summary }}{{ end }}",
  "url": "{{ .Permalink }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.Params.author }}",
    "url": "{{ site.BaseURL }}"
  },
  "publisher": {
    "@type": "Person",
    "name": "{{ site.Params.author }}",
    "url": "{{ site.BaseURL }}"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
  {{ with .Params.tags }},"keywords": "{{ delimit . ", " }}"{{ end }}
}
</script>
{{ end }}

<!-- Non-Blocking Async KaTeX Support for Math Equations -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" media="print" onload="this.media='all'" crossorigin="anonymous">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" crossorigin="anonymous"></noscript>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\\\[', right: '\\\\]', display: true},
      {left: '\\\\(', right: '\\\\)', display: false}
    ],
    throwOnError : false
  });"></script>
